name: ifort

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ci
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/ci.yml

  integration-tests:
    name: ${{ matrix.toolchain.version }} ${{ matrix.image }} ${{
      matrix.toolchain.msystem }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.image }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        image: [ubuntu-24.04, ubuntu-22.04]
        toolchain:
          - { compiler: ifort, version: "2021.13" }
          - { compiler: ifort, version: "2021.12" }
          - { compiler: ifort, version: "2021.11" }
          - { compiler: ifort, version: "2021.10" }
          - { compiler: ifort, version: "2021.9" }
          - { compiler: ifort, version: "2021.8" }
          - { compiler: ifort, version: "2021.7" }
          - { compiler: ifort, version: "2021.6" }
          - { compiler: ifort, version: "2021.5" }
          - { compiler: ifort, version: "2021.4" }
          - { compiler: ifort, version: "2021.3" }
          - { compiler: ifort, version: "2021.2" }
          - { compiler: ifort, version: "2021.1" }
        include:
          - image: macos-26-intel
            toolchain: { compiler: ifort, version: "2021.10" }
          - image: macos-15-intel
            toolchain: { compiler: ifort, version: "2021.10" }
          - image: macos-26-intel
            toolchain: { compiler: ifort, version: "2021.9" }
          - image: macos-15-intel
            toolchain: { compiler: ifort, version: "2021.9" }
          - image: macos-26-intel
            toolchain: { compiler: ifort, version: "2021.8" }
          - image: macos-15-intel
            toolchain: { compiler: ifort, version: "2021.8" }
          - image: macos-26-intel
            toolchain: { compiler: ifort, version: "2021.6" }
          - image: macos-15-intel
            toolchain: { compiler: ifort, version: "2021.6" }
          - image: macos-26-intel
            toolchain: { compiler: ifort, version: "2021.5" }
          - image: macos-15-intel
            toolchain: { compiler: ifort, version: "2021.5" }
          - image: macos-26-intel
            toolchain: { compiler: ifort, version: "2021.3" }
          - image: macos-15-intel
            toolchain: { compiler: ifort, version: "2021.3" }
          - image: macos-26-intel
            toolchain: { compiler: ifort, version: "2021.2" }
          - image: macos-15-intel
            toolchain: { compiler: ifort, version: "2021.2" }
          - image: macos-26-intel
            toolchain: { compiler: ifort, version: "2021.1" }
          - image: macos-15-intel
            toolchain: { compiler: ifort, version: "2021.1" }
          - image: windows-2025
            toolchain: { compiler: ifort, version: "2021.13" }
          - image: windows-2022
            toolchain: { compiler: ifort, version: "2021.13" }
          - image: windows-2025
            toolchain: { compiler: ifort, version: "2021.12" }
          - image: windows-2022
            toolchain: { compiler: ifort, version: "2021.12" }
          - image: windows-2025
            toolchain: { compiler: ifort, version: "2021.11" }
          - image: windows-2022
            toolchain: { compiler: ifort, version: "2021.11" }
          - image: windows-2025
            toolchain: { compiler: ifort, version: "2021.10" }
          - image: windows-2022
            toolchain: { compiler: ifort, version: "2021.10" }
          - image: windows-2025
            toolchain: { compiler: ifort, version: "2021.9" }
          - image: windows-2022
            toolchain: { compiler: ifort, version: "2021.9" }
          - image: windows-2025
            toolchain: { compiler: ifort, version: "2021.7" }
          - image: windows-2022
            toolchain: { compiler: ifort, version: "2021.7" }
          - image: windows-2025
            toolchain: { compiler: ifort, version: "2021.6" }
          - image: windows-2022
            toolchain: { compiler: ifort, version: "2021.6" }

    steps:
      - uses: actions/checkout@v6

      - name: Restore dist-tests
        uses: actions/download-artifact@v8
        with:
          name: generated-dist-tests
          path: dist-tests

      - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
        id: setup
        uses: ./
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}

      - name: Verify installed version
        run: 'echo "Output: ${{ steps.setup.outputs.version }}"'

      - name: Run Integration Tests
        run: npm run integration-test
