name: ifort

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ci
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/ci.yml

  integration-tests:
    name: ${{ matrix.toolchain.version }} ${{ matrix.image }} ${{
      matrix.toolchain.msystem }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.image }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        image: [windows-2025-vs2026]
        toolchain:
          - { compiler: ifort, version: "2021.13" }
          - { compiler: ifort, version: "2021.12" }
          - { compiler: ifort, version: "2021.11" }
          - { compiler: ifort, version: "2021.10" }
          - { compiler: ifort, version: "2021.9" }
          - { compiler: ifort, version: "2021.7" }
          - { compiler: ifort, version: "2021.6" }
    steps:
      - uses: actions/checkout@v6

      - name: Restore dist-tests
        uses: actions/download-artifact@v8
        with:
          name: generated-dist-tests
          path: dist-tests

      - name: Diagnose link.exe on PATH
        shell: cmd
        run: |
          echo === PATH entries ===
          for %%p in ("%PATH:;=" "%") do echo %%p
          echo === where link ===
          where link
          echo === where link.exe ===
          where link.exe
          echo === vswhere result ===
          "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -find "VC\Tools\MSVC\*\bin\Hostx64\x64\link.exe"

      - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
        id: setup
        uses: ./
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}

      - name: Verify installed version
        run: 'echo "Output: ${{ steps.setup.outputs.version }}"'

      - name: Run Integration Tests
        run: npm run integration-test
