name: flang

on:
  # it works, disable automatic trigger for now
  workflow_dispatch:
    # push:
    #     branches: [ main ]
    # pull_request:

jobs:
  build:
    name: ci
    uses: ./.github/workflows/ci.yml

  integration-tests:
    name: ${{ matrix.toolchain.version }} ${{ matrix.image }} ${{
      matrix.toolchain.windowsEnv }}
    runs-on: ${{ matrix.image }}
    needs: [ build ]
    strategy:
      fail-fast: false
      matrix:
        image: [ ubuntu-24.04, ubuntu-22.04, ubuntu-24.04-arm, ubuntu-22.04-arm ]
        toolchain:
          - { compiler: flang, version: "22" }
          - { compiler: flang, version: "21" }
          - { compiler: flang, version: "20" }
          - { compiler: flang, version: "19" }
          - { compiler: flang, version: "18" }
          - { compiler: flang, version: "17" }
        include:
          - image: ubuntu-22.04
            toolchain: { compiler: flang, version: "16" }
          - image: macos-26
            toolchain: { compiler: flang } # only latest version available from brew
          - image: macos-26-intel
            toolchain: { compiler: flang } # only latest version available from brew
          - image: macos-15
            toolchain: { compiler: flang } # only latest version available from brew
          - image: macos-15-intel
            toolchain: { compiler: flang } # only latest version available from brew
          - image: macos-14
            toolchain: { compiler: flang } # only latest version available from brew
          - image: macos-26
            toolchain: { compiler: flang, version: "21" }
          - image: macos-26
            toolchain: { compiler: flang, version: "21.1.6" } # test that patch versions are accepted and resolved correctly
          - image: macos-26
            toolchain: { compiler: flang, version: "20" }
          - image: macos-26
            toolchain: { compiler: flang, version: "19" }
          - image: macos-15
            toolchain: { compiler: flang, version: "21" }
          - image: macos-15
            toolchain: { compiler: flang, version: "20" }
          - image: macos-15
            toolchain: { compiler: flang, version: "19" }
          - image: macos-26-intel
            toolchain: { compiler: flang, version: "19" }
          - image: macos-15-intel
            toolchain: { compiler: flang, version: "19" }
          - image: windows-2025
            toolchain: { compiler: flang, version: "22" }
          - image: windows-2025
            toolchain: { compiler: flang, version: "22.1.0" } # test that patch versions are accepted and resolved correctly
          - image: windows-2022
            toolchain: { compiler: flang, version: "22" }
          - image: windows-11-arm
            toolchain: { compiler: flang, version: "22" }
          - image: windows-11-arm
            toolchain: { compiler: flang, version: "21" }
          - image: windows-11-arm
            toolchain: { compiler: flang, version: "20" }
          - image: windows-2025
            toolchain: { compiler: flang, windowsEnv: ucrt64 } # only latest version available from Pacman
          - image: windows-2022
            toolchain: { compiler: flang, windowsEnv: ucrt64 } # only latest version available from Pacman
          - image: windows-2025
            toolchain: { compiler: flang, windowsEnv: clang64 } # only latest version available from Pacman
          - image: windows-2022
            toolchain: { compiler: flang, windowsEnv: clang64 } # only latest version available from Pacman
    steps:
      - uses: actions/checkout@v6

      - name: Restore dist-tests
        uses: actions/download-artifact@v8
        with:
          name: generated-dist-tests
          path: dist-tests

      - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
        id: setup
        uses: ./
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}
          windows-env: ${{ matrix.toolchain.windowsEnv }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify installed version
        run: "echo \"Output: ${{ steps.setup.outputs.version }}\""

      - name: Run Integration Tests
        run: npm run integration-test
