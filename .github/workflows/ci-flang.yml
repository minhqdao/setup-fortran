name: flang

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: ci
    uses: ./.github/workflows/ci.yml

  integration-tests:
    name: ${{ matrix.toolchain.version }} ${{ matrix.image }} ${{
      matrix.toolchain.windowsEnv }}
    runs-on: ${{ matrix.image }}
    needs: [ build ]
    strategy:
      fail-fast: false
      matrix:
        image: [ ubuntu-24.04, ubuntu-22.04, ubuntu-24.04-arm, ubuntu-22.04-arm ]
          # macos-26,
          # macos-26-intel,
          # macos-15,
          # macos-15-intel,
          # macos-14,
          # windows-2025,
          # windows-2022,
          # windows-11-arm,
        toolchain:
          # - { compiler: flang, version: "22" }
          # - { compiler: flang, version: "21" }
          # - { compiler: flang, version: "20" }
          # - { compiler: flang, version: "19" }
          # - { compiler: flang, version: "18" }
          - { compiler: flang, version: "17" }
          - { compiler: flang, version: "16" }
          - { compiler: flang, version: "15" }
          # include:
          #   - image: ubuntu-24.04
          #     toolchain: { compiler: flang, version: "16" }
          #   - image: ubuntu-22.04
          #     toolchain: { compiler: flang, version: "16" }
          #   - image: ubuntu-24.04
          #     toolchain: { compiler: flang, version: "15" }
          #   - image: ubuntu-22.04
          #     toolchain: { compiler: flang, version: "15" }
          #   - image: ubuntu-24.04
          #     toolchain: { compiler: flang, version: "14" }
          #   - image: ubuntu-22.04
          #     toolchain: { compiler: flang, version: "14" }
          #   - image: ubuntu-24.04
          #     toolchain: { compiler: flang, version: "13" }
          #   - image: ubuntu-22.04
          #     toolchain: { compiler: flang, version: "13" }
          # - image: windows-2025
          #   toolchain: { compiler: flang, windowsEnv: ucrt64 } # set up MSYS2 and use pacman's rolling gcc release

    steps:
      - uses: actions/checkout@v6

      - name: Restore dist-tests
        uses: actions/download-artifact@v8
        with:
          name: generated-dist-tests
          path: dist-tests

      - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
        id: setup
        uses: ./
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}

      - name: Verify installed version
        run: "echo \"Output: ${{ steps.setup.outputs.compiler-version }}\""

      - name: Run Integration Tests
        run: npm run integration-test
