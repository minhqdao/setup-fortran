name: lfortran

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:

jobs:
  build:
    name: ci
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/ci.yml

  integration-tests:
    name: ${{ matrix.toolchain.version }} ${{ matrix.image }} ${{
      matrix.toolchain.msystem }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.image }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        image:
          [
            ubuntu-24.04,
            ubuntu-22.04,
            macos-26,
            macos-26-intel,
            macos-15,
            macos-15-intel,
            macos-14,
            windows-2025,
            windows-2022,
          ]
        toolchain:
          - { compiler: lfortran, version: "0.63.0" }
          - { compiler: lfortran, version: "0.62.0" }
          - { compiler: lfortran, version: "0.61.0" }
          - { compiler: lfortran, version: "0.60.0" }
          - { compiler: lfortran, version: "0.59.0" }
          - { compiler: lfortran, version: "0.58.0" }
          - { compiler: lfortran, version: "0.57.0" }
        include:
          - image: windows-2025
            toolchain: { compiler: lfortran, msystem: ucrt64 } # only latest version available from Pacman
          - image: windows-2022
            toolchain: { compiler: lfortran, msystem: ucrt64 } # only latest version available from Pacman
          - image: windows-2025
            toolchain: { compiler: lfortran, msystem: clang64 } # only latest version available from Pacman
          - image: windows-2022
            toolchain: { compiler: lfortran, msystem: clang64 } # only latest version available from Pacman
    steps:
      - uses: actions/checkout@v7

      - name: Restore dist-tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: gh run download ${{ github.run_id }} --name generated-dist-tests --dir dist-tests
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
        id: setup
        uses: ./
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}
          msystem: ${{ matrix.toolchain.msystem }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify installation
        run: |
          echo "Fortran Compiler Setup:"
          echo "  Version: ${{ steps.setup.outputs.version }}"
          echo "  FC:      ${{ steps.setup.outputs.fc }}"
          echo "  F77:     ${{ steps.setup.outputs.f77 }}"
          echo "  F90:     ${{ steps.setup.outputs.f90 }}"
          echo "  CC:      ${{ steps.setup.outputs.cc }}"
          echo "  CXX:     ${{ steps.setup.outputs.cxx }}"

      - name: Run Integration Tests
        run: npm run integration-test
