name: nvfortran

on:
    push:
        branches: [ main ]
    pull_request:

jobs:
    build:
        name: ci
        uses: ./.github/workflows/ci.yml

    integration-tests:
        name: ${{ matrix.toolchain.version }} ${{ matrix.image }} ${{
            matrix.toolchain.windowsEnv }}
        runs-on: ${{ matrix.image }}
        needs: [ build ]
        strategy:
            fail-fast: false
            matrix:
                image: [ ubuntu-24.04, ubuntu-22.04, ubuntu-24.04-arm, ubuntu-22.04-arm ]

                toolchain:
                    - { compiler: nvfortran, version: "26.3" }
                    - { compiler: nvfortran, version: "26.1" }
                    - { compiler: nvfortran, version: "25.11" }
                    - { compiler: nvfortran, version: "25.9" }
                    - { compiler: nvfortran, version: "25.7" }
                    - { compiler: nvfortran, version: "25.5" }
                    - { compiler: nvfortran, version: "25.3" }
                    - { compiler: nvfortran, version: "25.1" }
                    - { compiler: nvfortran, version: "24.11" }
                    - { compiler: nvfortran, version: "24.9" }
                    - { compiler: nvfortran, version: "24.7" }
                    - { compiler: nvfortran, version: "24.5" }
                    - { compiler: nvfortran, version: "24.3" }
                    - { compiler: nvfortran, version: "24.1" }
                    - { compiler: nvfortran, version: "23.11" }
                exclude:
                    - image: ubuntu-24.04
                      toolchain: { compiler: nvfortran, version: "24.3" }
                    - image: ubuntu-24.04
                      toolchain: { compiler: nvfortran, version: "24.1" }
                    - image: ubuntu-24.04
                      toolchain: { compiler: nvfortran, version: "23.11" }
                    - image: ubuntu-24.04-arm
                      toolchain: { compiler: nvfortran, version: "24.3" }
                    - image: ubuntu-24.04-arm
                      toolchain: { compiler: nvfortran, version: "24.1" }
                    - image: ubuntu-24.04-arm
                      toolchain: { compiler: nvfortran, version: "23.11" }

        steps:
            - uses: actions/checkout@v6

            - name: Restore dist-tests
              uses: actions/download-artifact@v8
              with:
                  name: generated-dist-tests
                  path: dist-tests

            - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
              id: setup
              uses: ./
              with:
                  compiler: ${{ matrix.toolchain.compiler }}
                  version: ${{ matrix.toolchain.version }}

            - name: Verify installed version
              run: "echo \"Output: ${{ steps.setup.outputs.compiler-version }}\""

            - name: Run Integration Tests
              run: npm run integration-test
