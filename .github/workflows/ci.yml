name: CI

on:
  workflow_call:

env:
  NODE_VERSION: "24"

jobs:
  format-lint:
    name: format, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [format-lint, unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Verify dist is up to date
        run: |
          npm run build
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date. Please run 'npm run build' and commit the changes."
            git diff --stat dist/
            exit 1
          fi

      - name: Build dist-tests and save
        run: npm run build:integration-test

      - name: Save dist-tests
        uses: actions/upload-artifact@v7
        with:
          name: generated-dist-tests
          path: dist-tests
