name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: "24"

jobs:
  format-lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  build:
    name: Build dist and dist-tests
    runs-on: ubuntu-latest
    needs: [ format-lint, unit-tests ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Verify dist is up to date
        run: |
          npm run build
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date. Please run 'npm run build' and commit the changes."
            git diff --stat dist/
            exit 1
          fi

      - name: Build dist-tests and save
        run: npm run build:integration-test

      - name: Save dist-tests
        uses: actions/upload-artifact@v7
        with:
          name: generated-dist-tests
          path: dist-tests

  integration-tests:
    name: ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }} ${{
      matrix.image }}
    runs-on: ${{ matrix.image }}
    needs: [ build ]
    strategy:
      fail-fast: false
      matrix:
        image: [ ubuntu-24.04 ]
          # ubuntu-22.04,
          # ubuntu-24.04-arm,
          # ubuntu-22.04-arm,
          # macos-26,
          # macos-26-intel,
          # macos-15,
          # macos-15-intel,
          # macos-14,
          # windows-2025,
          # windows-2022,
          # windows-11-arm,
        toolchain:
          - { compiler: gfortran, version: "15" }
          # - { compiler: gfortran, version: "14" }
          # - { compiler: gfortran, version: "13" }
          # - { compiler: gfortran, version: "12" }
          # - { compiler: gfortran, version: "11" }
        include:
          - image: ubuntu-latest # no compiler and version specified, should default to the latest gfortran version
          - image: macos-latest # no compiler and version specified, should default to the latest gfortran version
          - image: windows-latest # no compiler and version specified, should default to the latest gfortran version

    steps:
      - uses: actions/checkout@v6

      - name: Restore dist-tests
        uses: actions/download-artifact@v8
        with:
          name: generated-dist-tests
          path: dist-tests

      - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
        id: setup
        uses: ./
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}

      - name: Verify installed version
        run: "echo \"Output: ${{ steps.setup.outputs.compiler-version }}\""

      - name: Run Integration Tests
        run: npm run integration-test
