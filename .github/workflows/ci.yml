name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: "24"

jobs:
  format-lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

  unit-tests:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ format-lint, unit-tests ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist/
        run: npm run build

      - name: Verify dist is up to date
        run: |
          npm run build
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date. Please run 'npm run build' and commit the changes."
            git diff --stat dist/
            exit 1
          fi

  tests-gcc-linux:
    name: GCC ${{ matrix.version }} — Ubuntu
    runs-on: ubuntu-latest
    needs: [ build ]
    strategy:
      fail-fast: false
      matrix:
        version: [ "latest", "15" ]

    steps:
      - uses: actions/checkout@v6

      - name: Install GCC
        id: setup
        uses: ./
        with:
          compiler: gcc
          version: ${{ matrix.version }}

      - name: Verify installed version
        run: |
          gcc --version
          gfortran --version
          echo "Output: ${{ steps.setup.outputs.compiler-version }}"

      - name: Compile a Fortran hello world
        run: |
          cat > hello.f90 << 'EOF'
          program hello
            print *, "Hello from GFortran!"
          end program hello
          EOF
          gfortran hello.f90 -o hello
          ./hello
