name: ifx

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ci
    uses: ./.github/workflows/ci.yml

  integration-tests:
    name: ${{ matrix.toolchain.version }} ${{ matrix.image }}
    runs-on: ${{ matrix.image }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        image: [ubuntu-24.04, ubuntu-22.04, windows-latest, windows-2022]
        toolchain:
          - { compiler: ifx, version: "latest" }
        include:
          - image: ubuntu-24.04
            toolchain: { compiler: ifx, version: "2025.3" }
          - image: ubuntu-22.04
            toolchain: { compiler: ifx, version: "2024.2" }

    steps:
      - uses: actions/checkout@v6

      - name: Restore dist-tests
        uses: actions/download-artifact@v8
        with:
          name: generated-dist-tests
          path: dist-tests

      - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
        id: setup
        uses: ./
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}

      - name: Verify installed version
        run: 'echo "Output: ${{ steps.setup.outputs.compiler-version }}"'

      - name: Run Integration Tests
        run: npm run integration-test
