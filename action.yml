name: "Setup Fortran Compilers"
description: Set up Fortran compilers on GitHub Actions runners
author: minhqdao
branding:
  icon: cpu
  color: purple

inputs:
  compiler:
    description: Fortran compiler to install. Defaults to `gfortran`.
    required: false
    default: gfortran
  version:
    description: Compiler version to install. Defaults to the latest version.
    required: false
  msystem:
    description: Windows environment to use. Defaults to `native`. Ignored on
      non-Windows runners.
    required: false
    default: native

outputs:
  version:
    description: The installed compiler version
  fc:
    description: The Fortran compiler path
  f77:
    description: The Fortran 77 compiler path
  f90:
    description: The Fortran 90 compiler path
  cc:
    description: The C compiler command or path
  cxx:
    description: The C++ compiler command or path

runs:
  using: node24
  main: dist/index.js
